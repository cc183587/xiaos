<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工厂产量薪资管理系统</title>
<!-- SheetJS 用于导出Excel -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,sans-serif}
  body{background:#f0f2f5;padding:15px;max-width:640px;margin:0 auto}
  h1{font-size:24px;text-align:center;margin:16px 0;color:#c0392b;font-weight:bold}
  h2{font-size:18px;font-weight:bold;margin:10px 0;color:#333}

  .btn{width:100%;font-size:17px;padding:14px;margin:8px 0;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer}
  .btn:active{opacity:.85}
  .btn-red{background:#ff3b30}
  .btn-green{background:#34c759}
  .btn-orange{background:#ff9500}
  .btn-sm{font-size:13px;padding:6px 12px;margin:4px;background:#007AFF;color:#fff;border:none;border-radius:6px;cursor:pointer}
  .btn-sm-red{background:#ff3b30}
  .btn-sm-green{background:#34c759}
  .btn-sm-orange{background:#ff9500}

  input,select{width:100%;font-size:16px;padding:10px;margin:6px 0;border:1px solid #ccc;border-radius:6px;background:#fff}
  input[type=number]{-moz-appearance:textfield}

  .item{display:flex;align-items:center;gap:8px;margin:6px 0;background:#fff;padding:10px;border-radius:6px;border:1px solid #E9ECEF}
  .item .name{flex:0 0 110px;font-size:15px}
  .item .price{flex:0 0 80px;font-size:13px;color:#888}
  .item input{flex:1;margin:0}

  .box{background:#F8F9FA;padding:14px;margin:8px 0;border-radius:8px;border:1px solid #E9ECEF;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .title{font-weight:bold;margin:10px 0;font-size:16px;color:#212529}
  .tag{display:inline-block;padding:2px 10px;background:#e8f4ff;color:#007AFF;border-radius:12px;font-size:13px;margin:2px}
  .row{display:flex;gap:8px;align-items:center;margin:4px 0}
  .row input{margin:0}

  .nav{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap}
  .nav button{flex:1;padding:10px;font-size:14px;background:#fff;border:1px solid #ddd;border-radius:8px;cursor:pointer;min-width:60px}
  .nav button.active{background:#007AFF;color:#fff;border-color:#007AFF}
  #adminTitle{position:fixed;top:0;left:0;right:0;background:#f0f2f5;z-index:101;padding:12px 0 2px;text-align:center;font-size:20px;margin:0}
  #adminNav{position:fixed;top:44px;left:0;right:0;background:#f0f2f5;z-index:100;padding:8px 10px;max-width:640px;margin:0 auto;box-shadow:0 2px 8px rgba(0,0,0,.1)}

  table{width:100%;border-collapse:collapse;font-size:14px;margin:6px 0;background:#fff;border-radius:8px;overflow:hidden}
  th{background:#495057;color:#fff;padding:10px 8px;text-align:left}
  td{padding:9px 8px;border-bottom:1px solid #E9ECEF;color:#495057}
  tr:nth-child(even) td{background:#F8F9FA}
  tr:last-child td{border-bottom:none}

  .divider{border:none;border-top:1px solid #e0e0e0;margin:12px 0}
  .hint{font-size:13px;color:#999;margin:4px 0}
  #empResult{font-size:15px;line-height:1.8}

  .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:999}
  .modal-overlay.show{display:flex}
  .modal{background:#fff;padding:20px;border-radius:12px;max-width:400px;width:90%;box-shadow:0 10px 40px rgba(0,0,0,.3)}
  .modal-title{font-size:18px;font-weight:bold;margin-bottom:12px}
  .modal-msg{margin-bottom:16px;line-height:1.6}
  .modal-input{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;margin-bottom:12px;display:none}
  .modal-input.show{display:block}
  .modal-btns{display:flex;gap:8px;justify-content:flex-end}
  .modal-btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:15px}
  .modal-cancel{background:#f0f0f0;color:#333}
  .modal-confirm{background:#007AFF;color:#fff}
  .modal-confirm.danger{background:#ff3b30}

  .logout-float{position:fixed;top:12px;right:12px;z-index:100;font-size:13px;padding:6px 14px;background:#888;color:#fff;border:none;border-radius:6px;cursor:pointer;display:none}
  .logout-float:hover{background:#666}

  /* Toast 提示样式 */
  .toast-container{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:10000;display:flex;flex-direction:column;align-items:center;gap:10px;pointer-events:none}
  .toast{background:#333;color:#fff;padding:12px 24px;border-radius:8px;font-size:15px;box-shadow:0 4px 12px rgba(0,0,0,.15);opacity:0;transition:opacity .3s,transform .3s;transform:translateY(10px);max-width:90%}
  .toast.show{opacity:1;transform:translateY(0)}
  .toast.success{background:#10B981}
  .toast.error{background:#DC2626}
  .toast.info{background:#007AFF}
  .toast.delete{background:#ff3b30;color:#fff}

  /* 批次卡片新样式 */
  .batch-card{background:#F8F9FA;border-radius:8px;padding:16px;margin:10px 0;border:1px solid #E9ECEF;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .batch-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #E9ECEF}
  .batch-code{color:#212529;font-size:16px;font-weight:600}
  .batch-status{font-size:13px;font-weight:600;padding:4px 12px;border-radius:20px;letter-spacing:.3px}
  .batch-product{color:#1a1a1a;font-size:15px;font-weight:700;margin-bottom:14px}
  .batch-data{margin-bottom:12px}
  .batch-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:15px;color:#495057}
  .batch-num{color:#212529;font-weight:500}
  .batch-profit{color:#dc2626;font-weight:700;font-size:18px}
  .batch-actions{display:flex;justify-content:flex-end;gap:6px}

  /* 薪资明细卡片样式 */
  .salary-card{background:#F8F9FA;border-radius:8px;padding:16px;margin:10px 0;border:1px solid #E9ECEF;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .card-header{margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #E9ECEF;font-size:14px;color:#6C757D}
  .detail-item{display:flex;align-items:center;margin-bottom:10px;font-size:14px;color:#495057}
  .check-icon{color:#10B981;margin-right:8px;font-weight:bold}
  .num{color:#212529;font-weight:500}
  .total-salary{color:#dc2626;font-size:20px;font-weight:700}

  /* 薪资合计卡片样式 */
  .salary-total-card{background:#F5F7FF;border-radius:8px;padding:16px;margin-bottom:12px;border:1px solid #E0E7FF;box-shadow:0 2px 8px rgba(0,0,0,.06)}

  /* ===== 总览页面重设计 ===== */
  .sv-today{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);border-radius:14px;padding:20px;margin:0 0 14px;color:#fff;box-shadow:0 8px 24px rgba(15,52,96,.35)}
  .sv-today-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .sv-today-title{font-size:15px;font-weight:600;opacity:.85;letter-spacing:.5px}
  .sv-today-date{font-size:12px;opacity:.55;background:rgba(255,255,255,.1);padding:3px 10px;border-radius:20px}
  .sv-today-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .sv-today-cell{background:rgba(255,255,255,.08);border-radius:10px;padding:12px 8px;text-align:center;border:1px solid rgba(255,255,255,.1);transition:background .2s}
  .sv-today-cell.positive{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.3)}
  .sv-today-cell.negative{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.3)}
  .sv-today-label{font-size:11px;opacity:.6;margin-bottom:6px;letter-spacing:.3px}
  .sv-today-val{font-size:22px;font-weight:700;line-height:1.1;margin-bottom:2px}
  .sv-today-val.orange{color:#ffb347}
  .sv-today-val.red{color:#ff6b6b}
  .sv-today-val.green{color:#6ee7b7}
  .sv-today-val.dimred{color:#ff6b6b}
  .sv-today-unit{font-size:11px;opacity:.5}
  .sv-empty{text-align:center;font-size:13px;opacity:.4;margin-top:6px;padding:4px 0}

  .sv-section{border-radius:12px;padding:16px;margin:0 0 12px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
  .sv-section.thismonth{background:#fff;border:1px solid #e8edf4}
  .sv-section.lastmonth{background:#fff;border:1px solid #e8edf4}
  .sv-section.alltime{background:#fff;border:1px solid #e8edf4}
  .sv-section-head{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
  .sv-section-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .sv-section-dot.blue{background:#007AFF}
  .sv-section-dot.amber{background:#ff9500}
  .sv-section-dot.purple{background:#8b5cf6}
  .sv-section-label{font-size:15px;font-weight:700;color:#1a1a1a}
  .sv-section-sub{font-size:12px;color:#aaa;margin-left:auto}

  /* Tab 卡片 */
  .sv-tab-card{padding:0;overflow:hidden}
  .sv-tabs{display:flex;border-bottom:1px solid #f0f0f0}
  .sv-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:12px 8px 10px;background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;transition:all .2s;position:relative;margin-bottom:-1px}
  .sv-tab:hover{background:#f8faff}
  .sv-tab.active{border-bottom-color:currentColor}
  .sv-tab.active[id="svTabThis"]{border-bottom-color:#007AFF}
  .sv-tab.active[id="svTabLast"]{border-bottom-color:#ff9500}
  .sv-tab.active[id="svTabAll"]{border-bottom-color:#8b5cf6}
  .sv-tab-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .sv-tab-dot.blue{background:#007AFF}
  .sv-tab-dot.amber{background:#ff9500}
  .sv-tab-dot.purple{background:#8b5cf6}
  .sv-tab-name{font-size:14px;font-weight:700;color:#1a1a1a}
  .sv-tab.active[id="svTabThis"] .sv-tab-name{color:#007AFF}
  .sv-tab.active[id="svTabLast"] .sv-tab-name{color:#ff9500}
  .sv-tab.active[id="svTabAll"]  .sv-tab-name{color:#8b5cf6}
  .sv-tab-sub{font-size:11px;color:#bbb}
  .sv-tab-panel{padding:16px}
  .sv-kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .sv-kpi{border-radius:10px;padding:14px 12px;text-align:left}
  .sv-kpi.in{background:#f0fdf4;border:1px solid #bbf7d0}
  .sv-kpi.out{background:#fffbeb;border:1px solid #fde68a}
  .sv-kpi.profit{background:#eff6ff;border:1px solid #bfdbfe}
  .sv-kpi.wage{background:#fff5f5;border:1px solid #fecaca}
  .sv-kpi-icon{font-size:18px;margin-bottom:6px}
  .sv-kpi-name{font-size:12px;color:#888;margin-bottom:4px}
  .sv-kpi-val{font-size:22px;font-weight:700;line-height:1.1;color:#1a1a1a}
  .sv-kpi-val.green{color:#16a34a}
  .sv-kpi-val.amber{color:#d97706}
  .sv-kpi-val.blue{color:#2563eb}
  .sv-kpi-val.red{color:#dc2626}
  .sv-kpi-unit{font-size:12px;color:#aaa;margin-top:2px}

  .sv-action-bar{display:flex;gap:10px;margin:4px 0 14px}
  .sv-btn{flex:1;padding:13px;font-size:15px;font-weight:600;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s}
  .sv-btn:active{opacity:.8}
  .sv-btn.export{background:linear-gradient(135deg,#007AFF,#0055cc);color:#fff;box-shadow:0 3px 10px rgba(0,122,255,.3)}
  .sv-btn.backup{background:linear-gradient(135deg,#10B981,#059669);color:#fff;box-shadow:0 3px 10px rgba(16,185,129,.3)}
  .sv-btn.restore{background:#f0f0f0;color:#555}
  .sv-backup-row{display:flex;gap:8px;margin-bottom:14px}
  .card-title{font-size:16px;font-weight:600;color:#2D3748;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #E0E7FF;text-align:center}
  .amount-container{display:flex;justify-content:space-between;align-items:center}
  .amount-item{text-align:center;flex:1}
  .amount-label{font-size:12px;color:#718096;margin-bottom:4px;display:block}
  .amount-value{font-size:18px;font-weight:700;color:#4F46E5}
  .amount-unit{font-size:12px;color:#718096}

  /* 产品管理卡片样式 */
  .process-card{background:#F8F9FA;border-radius:8px;padding:20px;margin:10px 0;border:1px solid #E9ECEF;box-shadow:0 2px 8px rgba(0,0,0,.1);overflow-x:auto}
  .detail-item{display:flex;align-items:center;font-size:13px;padding:10px 0;border-bottom:1px dashed #E0E6ED}
  .detail-item:last-child{border-bottom:none}
  .detail-left,.detail-right{flex:1;min-width:100px;text-align:center;padding:0 4px;color:#495057}
  .detail-right{font-weight:500}
  .proc-opt-btn{display:inline-block;font-size:13px;font-weight:500;cursor:pointer;padding:5px 10px;border-radius:4px;text-align:center;border:none}
  .proc-edit-btn{background:#E0E7FF;color:#3B82F6}
  .proc-del-btn{background:#ff3b30;color:#fff}

  /* 员工管理卡片样式 */
  .staff-card{min-width:300px;max-width:100%;background:#F8F9FA;border-radius:8px;padding:20px;margin:10px 0;border:1px solid #E9ECEF;box-shadow:0 2px 8px rgba(0,0,0,.1);overflow-x:auto}
  .staff-header{display:flex;align-items:center;font-size:13px;font-weight:600;color:#212529;padding:10px 0;background:#E0E7FF;border-radius:6px;margin-bottom:12px;border:1px solid #C7D2FE}
  .emp-col-id,.emp-col-name,.emp-col-op{flex:1;min-width:80px;text-align:center;padding:0 4px}
  .staff-item{display:flex;align-items:center;font-size:13px;padding:10px 0;border-bottom:1px dashed #E0E6ED}
  .staff-item:last-child{border-bottom:none}
  .emp-col-id{color:#495057}.emp-col-name{color:#495057}.emp-col-op{}
  .del-btn{background:#ff3b30;border:none;color:#fff;font-size:13px;font-weight:500;cursor:pointer;padding:4px 10px;border-radius:4px}
  .del-btn:hover{background:#e0352b}
  .empty-value{color:#8A93A1}

  /* 查询记录卡片样式 - 固定表头 */
  .salary-detail-card{min-width:640px;max-width:900px;background:#F8F9FA;border-radius:8px;padding:20px;margin:10px 0;border:1px solid #E9ECEF;box-shadow:0 2px 8px rgba(0,0,0,.1);overflow-x:auto;position:relative;padding-top:50px}
  .detail-header{display:flex;align-items:center;font-size:13px;font-weight:600;color:#212529;padding:10px 0;background:#E0E7FF;border-radius:6px;margin-bottom:12px;border:1px solid #C7D2FE}
  .detail-header > div{text-align:center;padding:0 4px}
  .header-id{min-width:50px;flex:0 0 50px}
  .header-name{min-width:60px;flex:0 0 60px}
  .header-product{min-width:60px;flex:1}
  .header-process{min-width:60px;flex:1}
  .header-quantity{min-width:50px;flex:0 0 50px}
  .header-price{min-width:50px;flex:0 0 50px}
  .header-amount{min-width:60px;flex:0 0 60px}
  .header-date{min-width:90px;flex:0 0 90px}
  .header-op{min-width:90px;flex:0 0 90px}
  .detail-header{position:absolute;top:15px;left:20px;right:20px;z-index:1}
  .detail-item{display:flex;align-items:center;font-size:13px;padding:8px 0;border-bottom:1px dashed #E0E6ED}
  .detail-item > div{text-align:center;padding:0 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .detail-id{min-width:50px;flex:0 0 50px;color:#495057}
  .detail-name{min-width:60px;flex:0 0 60px;color:#8A93A1}
  .detail-product{min-width:60px;flex:1;color:#495057}
  .detail-process{min-width:60px;flex:1;color:#8A93A1}
  .detail-quantity{min-width:50px;flex:0 0 50px;color:#495057}
  .detail-price{min-width:50px;flex:0 0 50px;color:#495057}
  .detail-amount{min-width:60px;flex:0 0 60px;color:#4F46E5;font-weight:500}
  .detail-date{min-width:90px;flex:0 0 90px;color:#6C757D}
  .detail-op{min-width:100px;flex:0 0 100px;text-align:center;display:flex;gap:4px;justify-content:center}
  .rec-edit-btn,.rec-del-btn{flex:1;min-width:36px;max-width:42px}
  .detail-item:last-child{border-bottom:none}
  .rec-edit-btn{background:#E0E7FF;color:#4F46E5;border:none;border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer;margin:2px}
  .rec-del-btn{background:#ff3b30;color:#fff;border:none;border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer;margin:2px}

  /* 薪资明细卡片样式 - 5列等宽布局 */
  .salary-summary-card{min-width:500px;max-width:600px;background:#F8F9FA;border-radius:8px;padding:20px;margin:10px 0;border:1px solid #E9ECEF;box-shadow:0 2px 8px rgba(0,0,0,.1);overflow-x:auto}
  .salary-summary-card .sum-header{display:flex;align-items:center;font-size:13px;font-weight:600;color:#212529;padding:10px 0;background:#E0E7FF;border-radius:6px;margin-bottom:12px;border:1px solid #C7D2FE}
  .salary-summary-card .sum-header > div{flex:1;min-width:80px;text-align:center;padding:0 4px}
  .salary-summary-card .sum-item{display:flex;align-items:center;font-size:13px;padding:10px 0;border-bottom:1px dashed #E0E6ED}
  .salary-summary-card .sum-item:last-child{border-bottom:none}
  .salary-summary-card .sum-item > div{flex:1;min-width:80px;text-align:center;padding:0 4px}
  .sum-col-id{color:#495057}
  .sum-col-name{color:#8A93A1}
  .sum-col-name.has-value{color:#495057}
  .sum-col-amt{color:#4F46E5;font-weight:500}
  .salary-summary-card .sum-footer{display:flex;align-items:center;font-size:13px;padding:10px 0;font-weight:600;border-top:2px solid #E0E7FF;margin-top:8px}
  .salary-summary-card .sum-footer > div{flex:1;min-width:80px;text-align:center;padding:0 4px}
  .sum-footer-id{color:#212529;font-weight:600}
  .sum-footer-amt{color:#DC2626;font-weight:700;font-size:16px}
</style>
</head>
<body>

<!-- ========== 登录选择 ========== -->
<div id="loginPage" style="min-height:calc(100vh - 30px);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px">
  <h1 style="margin-bottom:20px">🎀 每日产量登记</h1>
  <div class="box" style="width:100%;max-width:360px">
    <input type="text" id="loginInput" placeholder="请输入工号">
    <button class="btn" onclick="login()">登录</button>
  </div>
</div>

<!-- ========== 员工页面 ========== -->
<div id="empPage" style="display:none">
  <h1 id="empTitle">员工产量登记</h1>
  <div id="empWelcome" style="text-align:center;color:#888;font-size:15px;margin-bottom:10px"></div>
  <div class="box">
    <select id="prod">
      <option value="">-- 请选择产品 --</option>
    </select>
    <div id="processList"></div>
    <button class="btn" onclick="empAdd()">确认登记</button>
  </div>
  <hr class="divider">
  <button class="btn" onclick="empShow()">查询薪资</button>
  <div class="box" id="empResult" style="min-height:0"></div>
  <button class="logout-float" onclick="logout()">退出</button>
</div>

<!-- Toast 容器 -->
<div id="toastContainer" class="toast-container"></div>

<!-- ========== 管理员主页 ========== -->
<div id="adminPage" style="display:none;padding-top:100px">
  <h1 id="adminTitle"></h1>
  <div class="nav" id="adminNav">
    <button onclick="showAdmin('summary')" data-tab="summary">总览</button>
    <button onclick="showAdmin('batch')" data-tab="batch">出入库</button>
    <button onclick="showAdmin('product')" data-tab="product">产品管理</button>
    <button onclick="showAdmin('emp')" data-tab="emp">员工管理</button>
    <button onclick="showAdmin('register')" data-tab="register">产量登记</button>
    <button onclick="showAdmin('record')" data-tab="record">查询记录</button>
    <button onclick="showAdmin('total')" data-tab="total">薪资明细</button>
  </div>

  <!-- 概要（点击才显示） -->
  <div id="adminSummary" style="display:none">

    <!-- 今日总览 -->
    <div id="summaryTodayContent"></div>

    <!-- 操作按钮行 -->
    <div class="sv-action-bar">
      <button class="sv-btn export" onclick="adminExportReport()">
        <span>📊</span> 导出报表
      </button>
    </div>

    <!-- 本月/上月/累计 Tab 卡片 -->

<script>
// ==================== 自定义模态框（替代 alert/confirm/prompt） ====================
let _modalResolve = null;

function showModal({title='', msg='', hasInput=false, inputDefault='', confirmText='确定', danger=false, cancelText='取消', hideCancel=false}){
  document.getElementById('customModalTitle').textContent = title;
  document.getElementById('customModalMsg').innerHTML = msg;
  const inp = document.getElementById('customModalInput');
  if(hasInput){
    inp.style.display = 'block';
    inp.value = inputDefault;
    setTimeout(()=>inp.focus(),100);
  } else {
    inp.style.display = 'none';
  }
  document.getElementById('customModalConfirm').textContent = confirmText;
  document.getElementById('customModalConfirm').className = danger ? 'danger' : '';
  document.getElementById('customModalCancel').textContent = cancelText;
  document.getElementById('customModalCancel').style.display = hideCancel ? 'none' : '';
  document.getElementById('customModal').classList.add('show');
  return new Promise(resolve => { _modalResolve = resolve; });
}
function modalConfirm(){
  const inp = document.getElementById('customModalInput');
  const val = inp.style.display !== 'none' ? inp.value : true;
  document.getElementById('customModal').classList.remove('show');
  if(_modalResolve){ _modalResolve(val); _modalResolve=null; }
}
function modalCancel(){
  document.getElementById('customModal').classList.remove('show');
  if(_modalResolve){ _modalResolve(null); _modalResolve=null; }
}

// ==================== 多公司配置 ====================
// 公司列表：prefix=工号前缀, name=公司名称, adminPwd=管理员密码
const COMPANIES = {
  A: { prefix: "a", name: "A公司", adminPwd: "sj" },
  B: { prefix: "b", name: "B公司", adminPwd: "gch" }
};

let currentCompany = "";  // 当前公司代码
let data = null;  // 当前公司的数据

let currentUser = "";
let editingProdKey = null;
let editingProcesses = [];

// 根据工号前缀识别公司
function detectCompany(empId){
  const prefix = empId.charAt(0).toLowerCase();
  for(const [code, info] of Object.entries(COMPANIES)){
    if(info.prefix === prefix) return code;
  }
  return null;
}

// 获取公司对应的 localStorage key
function getStorageKey(companyCode){
  return `factoryData_${companyCode}`;
}

// 默认产品配置
const DEFAULT_PRODUCTS = {
  s: { name: "音箱", processes: [
    {n:"贴喇叭",p:0.01},{n:"贴电池",p:0.01},{n:"点板",p:0.4},{n:"打螺丝",p:0.015}
  ]},
  h: { name: "耳机", processes: [
    {n:"穿线",p:0.02},{n:"贴棉",p:0.015},{n:"打锁扣",p:0.03},{n:"内外匙",p:0.025},{n:"打反螺丝",p:0.018}
  ]}
};

// 加载指定公司的数据
function loadData(companyCode){
  const storageKey = getStorageKey(companyCode);
  const saved = localStorage.getItem(storageKey);
  if(saved){
    data = JSON.parse(saved);
  } else {
    // 初始化新公司数据
    data = {
      emps: [{id:companyCode+"001",name:""},{id:companyCode+"002",name:""},{id:companyCode+"003",name:""}],
      records: {},
      products: DEFAULT_PRODUCTS,
      batches: [],
      batchSeq: {},
      regSeq: 0
    };
    localStorage.setItem(storageKey, JSON.stringify(data));
  }

  // 兼容旧数据：emps 可能是字符串数组
  if(data.emps.length > 0 && typeof data.emps[0] === 'string'){
    data.emps = data.emps.map(id => ({id, name: ""}));
  }
  // 兼容旧数据：如果没有products字段
  if(!data.products) data.products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
  // 兼容旧数据：如果没有batches字段
  if(!data.batches) data.batches = [];
  // 兼容旧数据：如果没有batchSeq字段
  if(!data.batchSeq) data.batchSeq = {};
  // 兼容旧数据：如果没有regSeq字段
  if(!data.regSeq) data.regSeq = 0;
  
  currentCompany = companyCode;
}

// Toast 提示函数
function showToast(message, type = 'info', duration = 2500){
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  
  // 触发动画
  setTimeout(() => toast.classList.add('show'), 10);
  
  // 自动移除
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

// 保存当前公司数据
function saveData(){
  if(currentCompany){
    localStorage.setItem(getStorageKey(currentCompany), JSON.stringify(data));
  }
}

function getEmpIds(){ return data.emps.map(e => e.id); }
function getEmpName(id){ const e = data.emps.find(x=>x.id===id); return e?.name || ""; }

// ==================== 统一登录 ====================
// 根据当前小时返回时间段问候语
function getGreeting(){
  const h = new Date().getHours();
  if(h >= 5 && h < 12)  return '早上好！';
  if(h >= 12 && h < 14) return '中午好！';
  if(h >= 14 && h < 18) return '下午好！';
  return '晚上好！';
}

function login(){
  const val = document.getElementById('loginInput').value.trim();
  if(!val){ showToast('请输入工号', 'error'); return; }

  // 先尝试识别公司
  let companyCode = detectCompany(val);
  
  // 管理员登录检测（不区分大小写）
  const valLower = val.toLowerCase();
  for(const [code, info] of Object.entries(COMPANIES)){
    if(valLower === info.adminPwd.toLowerCase()){
      companyCode = code;
      loadData(code);
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('adminPage').style.display = 'block';
      document.querySelectorAll('.logout-float').forEach(el => el.style.display = '');
      document.getElementById('adminTitle').textContent = info.name + ' 管理员面板';
      showAdmin('summary');
      showToast(`${getGreeting()} ${info.name} 管理员，登录成功`, 'success');
      return;
    }
  }
  
  // 如果没有识别到公司
  if(!companyCode){
    showToast('工号格式不正确，请以公司前缀开头（如a001、b001）', 'error');
    return;
  }
  
  // 加载对应公司数据
  loadData(companyCode);
  
  // 员工登录（不区分大小写）
  const normalizedVal = val.toLowerCase();
  const empId = getEmpIds().find(id => id.toLowerCase() === normalizedVal);
  if(empId){
    currentUser = empId;
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('empPage').style.display = 'block';
    document.querySelectorAll('.logout-float').forEach(el => el.style.display = '');
    document.getElementById('empTitle').textContent = COMPANIES[companyCode].name + ' 员工产量登记';
    rebuildProdSelect();
    document.getElementById('empResult').innerHTML = '';
    const emp = data.emps.find(e => e.id === empId);
    const empName = emp?.name || '';
    const greeting = getGreeting();
    // 欢迎语：早上好！廖雪晴 同学
    document.getElementById('empWelcome').textContent = empName ? `${greeting} ${empName} 同学` : greeting;
    showToast(`登录成功`, 'success');
    return;
  }

  showToast('工号不存在', 'error');
}

function adminLoadRecord(){
  const empFilter = document.getElementById('recordEmpId').value;
  const dateFilter = document.getElementById('recordDate').value;

  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  const thisMonthStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  
  let todayTotal = 0;
  let monthTotal = 0;
  let allTotal = 0;

  let html = `<div class="salary-detail-card">
    <div class="detail-header">
      <div class="header-id">工号</div>
      <div class="header-name">姓名</div>
      <div class="header-product">产品</div>
      <div class="header-process">工序</div>
      <div class="header-quantity">数量</div>
      <div class="header-price">单价</div>
      <div class="header-amount">金额</div>
      <div class="header-date">日期</div>
      <div class="header-op">操作</div>
    </div>`;
  let total = 0;
  let hasData = false;

  // 先收集所有记录，用于排序
  const allRecords = [];

  Object.keys(data.records).forEach(empId => {
    const emp = data.emps.find(e => e.id === empId);
    if(!emp) return;
    
    // 工号过滤
    if(empFilter && empId !== empFilter) return;

    Object.keys(data.records[empId]).forEach(date => {
      // 日期过滤
      if(dateFilter && date !== dateFilter) return;

      const dateData = data.records[empId][date];
      if(!dateData || typeof dateData !== 'object') return;

      Object.keys(dateData).forEach(prodKey => {
        const prodName = data.products[prodKey]?.name || prodKey;
        const recs = dateData[prodKey];
        if(!Array.isArray(recs)) return;

        recs.forEach((rec, recIdx) => {
          const amount = (rec.n || 0) * (rec.p || 0);
          total += amount;
          allTotal += amount;
          // 本月统计
          if(date.startsWith(thisMonthStr)){
            monthTotal += amount;
          }
          // 今日统计
          if(date === todayStr){
            todayTotal += amount;
          }
          hasData = true;
          const recKey = `${empId}|${date}|${prodKey}|${recIdx}`;
          // 收集记录数据用于排序
          allRecords.push({
            empId: empId,
            empName: emp.name || '-',
            prodName: prodName,
            procName: rec.name || '-',
            quantity: rec.n,
            price: rec.p,
            amount: amount,
            date: date,
            time: rec.time || '',
            recKey: recKey
          });
        });
      });
    });
  });

  // 按日期降序、时间降序排序（最新的在最上面）
  allRecords.sort((a, b) => {
    if(a.date !== b.date) return b.date.localeCompare(a.date);
    return (b.time || '').localeCompare(a.time || '');
  });

  // 渲染排序后的记录
  allRecords.forEach(rec => {
    html += `<div class="detail-item">
      <div class="detail-id">${rec.empId}</div>
      <div class="detail-name">${rec.empName}</div>
      <div class="detail-product">${rec.prodName}</div>
      <div class="detail-process">${rec.procName}</div>
      <div class="detail-quantity">${rec.quantity}</div>
      <div class="detail-price">${rec.price}</div>
      <div class="detail-amount">${rec.amount.toFixed(2)}</div>
      <div class="detail-date">${rec.date}</div>
      <div class="detail-op">
        <button class="rec-edit-btn" onclick="editRecord('${rec.recKey}')">修改</button>
        <button class="rec-del-btn" onclick="delRecord('${rec.recKey}')">删除</button>
      </div>
    </div>`;
  });

  // 薪资合计头部
  const totalHtml = `
    <div class="salary-total-card">
      <div class="card-title">薪资合计</div>
      <div class="amount-container">
        <div class="amount-item">
          <span class="amount-label">今日</span>
          <span class="amount-value">${todayTotal.toFixed(2)}</span>
          <span class="amount-unit">元</span>
        </div>
        <div class="amount-item">
          <span class="amount-label">本月</span>
          <span class="amount-value">${monthTotal.toFixed(2)}</span>
          <span class="amount-unit">元</span>
        </div>
        <div class="amount-item">
          <span class="amount-label">累计</span>
          <span class="amount-value">${allTotal.toFixed(2)}</span>
          <span class="amount-unit">元</span>
        </div>
      </div>
    </div>
  `;

  html += '</div>';
  if(!hasData) html = '<p style="text-align:center;padding:20px;color:#999">暂无记录</p>';
  else html += `<div class="title">本次查询总计：${total.toFixed(2)} 元</div>`;
  document.getElementById('adminRecordList').innerHTML = totalHtml + html;
}

// ==================== 管理员概要统计 ====================
// 解析日期字符串，返回 YYYY-MM 格式
function parseYearMonth(dateStr){
  if(!dateStr) return '';
  // 处理 YYYY/MM/DD 或 YYYY-MM-DD 格式
  const parts = dateStr.substring(0, 19).split(/[-\/]/);
  if(parts.length >= 2){
    const y = parts[0];
    const m = String(parts[1]).padStart(2, '0');
    return `${y}-${m}`;
  }
  return '';
}

// 从各种日期字符串中提取 YYYY-MM-DD（兼容 toLocaleString 中文格式和 ISO 格式）
function extractDateStr(dateStr){
  if(!dateStr) return '';
  // 尝试直接解析，取本地日期部分
  const d = new Date(dateStr);
  if(!isNaN(d.getTime())){
    return d.getFullYear() + '-'
      + String(d.getMonth() + 1).padStart(2, '0') + '-'
      + String(d.getDate()).padStart(2, '0');
  }
  // 兜底：截取前10位（YYYY-MM-DD 或 YYYY/MM/DD）
  return dateStr.substring(0, 10).replace(/\//g, '-');
}

// 数据备份函数
function backupData(){
  const backupObj = JSON.parse(localStorage.getItem(getStorageKey(currentCompany)) || '{}');
  const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  const companyName = COMPANIES[currentCompany]?.name || '未知公司';
  const filename = `${companyName}_数据备份_${timestamp}.json`;
  const blob = new Blob([JSON.stringify(backupObj, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`${companyName} 数据备份成功！`, 'success');
}

// 数据恢复函数
function restoreData(input){
  const file = input.files[0];
  if(!file) return;
  
  if(!confirm('恢复数据将覆盖当前所有数据，确定要继续吗？')){
    input.value = '';
    return;
  }
  
  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const importedData = JSON.parse(e.target.result);
      localStorage.setItem(getStorageKey(currentCompany), JSON.stringify(importedData));
      location.reload();
    } catch(err){
      showToast('数据格式错误，恢复失败！', 'error');
    }
  };
  reader.readAsText(file);
}

function switchSvTab(tab){
  // 切换面板显示
  ['this','last','all'].forEach(t => {
    document.getElementById('svPanel'+t.charAt(0).toUpperCase()+t.slice(1)).style.display = t === tab ? '' : 'none';
    const btn = document.getElementById('svTab'+t.charAt(0).toUpperCase()+t.slice(1));
    btn.classList.toggle('active', t === tab);
  });
}

function adminLoadSummary(){
  const now = new Date();
  const currentYear = now.getFullYear();
  const currentMonth = now.getMonth() + 1;
  
  // 今日日期字符串 YYYY-MM-DD
  const todayStr = now.toISOString().split('T')[0];

  // 计算本月的年月
  const thisYearMonth = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
  
  // 计算上月的年月
  let lastYear = currentYear;
  let lastMonth = currentMonth - 1;
  if(lastMonth < 1){
    lastMonth = 12;
    lastYear = currentYear - 1;
  }
  const lastYearMonth = `${lastYear}-${String(lastMonth).padStart(2, '0')}`;

  // ===== 今日统计 =====
  let todayOutQty   = 0;  // 今日出货数量
  let todayRevenue  = 0;  // 今日出货销售额（件数×单价）
  let todayWage     = 0;  // 今日员工薪资

  // 本月入库数量
  let inQty = 0;
  // 本月出库数量
  let outQty = 0;
  // 本月利润
  let profit = 0;
  // 本月员工薪资合计
  let wageTotal = 0;
  
  // 上月入库数量
  let lastInQty = 0;
  // 上月出库数量
  let lastOutQty = 0;
  // 上月利润
  let lastProfit = 0;
  // 上月员工薪资合计
  let lastWageTotal = 0;
  
  // 累计入库数量
  let allInQty = 0;
  // 累计出库数量
  let allOutQty = 0;
  // 累计利润
  let allProfit = 0;
  // 累计员工薪资
  let allWageTotal = 0;
  
  // 遍历批次统计出入库
  data.batches.forEach(b => {
    // 获取批次创建日期的年月
    const createYearMonth = parseYearMonth(b.createTime);
    
    // 累计统计 - 入库数量是所有批次数量（不管状态）
    allInQty += b.qty;

    // 累计统计 - 出库：按每次出货明细累加（兼容partial和out）
    if(b.deliveries && b.deliveries.length > 0){
      b.deliveries.forEach(d => {
        allOutQty += d.qty;
        allProfit += d.profit || 0;
        // 今日出货统计（deliveries的date是 toLocaleString，需提取日期部分）
        const dDateStr = extractDateStr(d.date);
        if(dDateStr === todayStr){
          todayOutQty += d.qty;
          todayRevenue += d.cost || (d.qty * b.price);
        }
      });
    } else if(b.status === 'out'){
      // 兼容旧数据（无deliveries字段）
      allOutQty += b.outQty || b.qty;
      allProfit += b.profit || 0;
      const dDateStr = extractDateStr(b.outDate || b.createTime);
      if(dDateStr === todayStr){
        todayOutQty += b.outQty || b.qty;
        todayRevenue += b.outCost || ((b.outQty || b.qty) * b.price);
      }
    }
    
    // 本月统计 - 入库（按创建月份，所有状态都算入库，因为入库是创建时就发生的）
    if(createYearMonth === thisYearMonth){
      inQty += b.qty;
    }
    // 本月统计 - 出库（按每次出货日期统计）
    if(b.deliveries && b.deliveries.length > 0){
      b.deliveries.forEach(d => {
        const outYearMonth = parseYearMonth(d.date);
        if(outYearMonth === thisYearMonth){ outQty += d.qty; profit += d.profit||0; }
        if(outYearMonth === lastYearMonth){ lastOutQty += d.qty; lastProfit += d.profit||0; }
      });
    } else if(b.status === 'out'){
      // 兼容旧数据
      const outYearMonth = parseYearMonth(b.outDate || b.createTime);
      if(outYearMonth === thisYearMonth){ outQty += b.outQty || b.qty; profit += b.profit||0; }
      if(outYearMonth === lastYearMonth){ lastOutQty += b.outQty || b.qty; lastProfit += b.profit||0; }
    }
    
    // 上月统计 - 入库
    if(createYearMonth === lastYearMonth){
      lastInQty += b.qty;
    }
  });
  
  // 遍历记录统计员工薪资
  Object.keys(data.records || {}).forEach(empId => {
    Object.keys(data.records[empId]).forEach(date => {
      const recYearMonth = date.substring(0, 7); // date 格式是 YYYY-MM-DD
      
      // 累计统计
      Object.keys(data.records[empId][date]).forEach(prodKey => {
        const recs = data.records[empId][date][prodKey];
        if(!Array.isArray(recs)) return;
        recs.forEach(rec => {
          if(rec && typeof rec === 'object'){
            allWageTotal += (rec.n || 0) * (rec.p || 0);
          }
        });
      });

      // 今日薪资
      if(date === todayStr){
        Object.keys(data.records[empId][date]).forEach(prodKey => {
          const recs = data.records[empId][date][prodKey];
          if(!Array.isArray(recs)) return;
          recs.forEach(rec => {
            if(rec && typeof rec === 'object'){
              todayWage += (rec.n || 0) * (rec.p || 0);
            }
          });
        });
      }
      
      // 本月统计
      if(recYearMonth === thisYearMonth){
        Object.keys(data.records[empId][date]).forEach(prodKey => {
          const recs = data.records[empId][date][prodKey];
          if(!Array.isArray(recs)) return;
          recs.forEach(rec => {
            if(rec && typeof rec === 'object'){
              wageTotal += (rec.n || 0) * (rec.p || 0);
            }
          });
        });
      }
      
      // 上月统计
      if(recYearMonth === lastYearMonth){
        Object.keys(data.records[empId][date]).forEach(prodKey => {
          const recs = data.records[empId][date][prodKey];
          if(!Array.isArray(recs)) return;
          recs.forEach(rec => {
            if(rec && typeof rec === 'object'){
              lastWageTotal += (rec.n || 0) * (rec.p || 0);
            }
          });
        });
      }
    });
  });
  
  // 今日收益 = 今日出货销售额 - 今日员工薪资
  const todayProfit = todayRevenue - todayWage;

  // —— 今日总览卡片（深色风格）——
  const todayProfitClass = todayProfit >= 0 ? 'green' : 'dimred';
  const todayProfitCellClass = todayProfit >= 0 ? 'positive' : 'negative';
  const todayHtml = `
    <div class="sv-today">
      <div class="sv-today-header">
        <span class="sv-today-title">☀️ 今日总览</span>
        <span class="sv-today-date">${todayStr}</span>
      </div>
      <div class="sv-today-grid">
        <div class="sv-today-cell">
          <div class="sv-today-label">出货数量</div>
          <div class="sv-today-val orange">${todayOutQty}</div>
          <div class="sv-today-unit">件</div>
        </div>
        <div class="sv-today-cell">
          <div class="sv-today-label">员工薪资</div>
          <div class="sv-today-val red">${todayWage.toFixed(2)}</div>
          <div class="sv-today-unit">元</div>
        </div>
        <div class="sv-today-cell ${todayProfitCellClass}">
          <div class="sv-today-label">今日收益</div>
          <div class="sv-today-val ${todayProfitClass}">${todayProfit >= 0 ? '+' : ''}${todayProfit.toFixed(2)}</div>
          <div class="sv-today-unit">元</div>
        </div>
      </div>
      ${todayOutQty === 0 ? '<div class="sv-empty">今日暂无出货记录</div>' : ''}
    </div>
  `;
  document.getElementById('summaryTodayContent').innerHTML = todayHtml;

  // 辅助函数：生成 KPI 网格
  function renderKpiGrid(inLabel, inVal, inUnit, outLabel, outVal, outUnit, profitVal, wageVal){
    return `
      <div class="sv-kpi-grid">
        <div class="sv-kpi in">
          <div class="sv-kpi-icon">📦</div>
          <div class="sv-kpi-name">${inLabel}</div>
          <div class="sv-kpi-val green">${inVal}</div>
          <div class="sv-kpi-unit">${inUnit}</div>
        </div>
        <div class="sv-kpi out">
          <div class="sv-kpi-icon">🚚</div>
          <div class="sv-kpi-name">${outLabel}</div>
          <div class="sv-kpi-val amber">${outVal}</div>
          <div class="sv-kpi-unit">${outUnit}</div>
        </div>
        <div class="sv-kpi profit">
          <div class="sv-kpi-icon">💰</div>
          <div class="sv-kpi-name">预估利润</div>
          <div class="sv-kpi-val blue">¥${profitVal}</div>
          <div class="sv-kpi-unit">元</div>
        </div>
        <div class="sv-kpi wage">
          <div class="sv-kpi-icon">👷</div>
          <div class="sv-kpi-name">员工薪资</div>
          <div class="sv-kpi-val red">¥${wageVal}</div>
          <div class="sv-kpi-unit">元</div>
        </div>
      </div>
    `;
  }

  // —— 本月 ——
  document.getElementById('svThisMonthLabel').textContent = `${currentYear}年${currentMonth}月`;
  document.getElementById('summaryContent').innerHTML = renderKpiGrid(
    '在库数量', inQty, '件',
    '出库数量', outQty, '件',
    profit.toFixed(2), wageTotal.toFixed(2)
  );

  // —— 上月 ——
  document.getElementById('svLastMonthLabel').textContent = `${lastYear}年${lastMonth}月`;
  document.getElementById('summaryLastContent').innerHTML = renderKpiGrid(
    '入库数量', lastInQty, '件',
    '出库数量', lastOutQty, '件',
    lastProfit.toFixed(2), lastWageTotal.toFixed(2)
  );

  // —— 累计 ——
  document.getElementById('summaryAllContent').innerHTML = renderKpiGrid(
    '总入库', allInQty, '件',
    '总出库', allOutQty, '件',
    allProfit.toFixed(2), allWageTotal.toFixed(2)
  );
}

function adminLoadTotal(){
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  const thisMonthStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

  let html = `<div class="salary-summary-card">
    <div class="sum-header">
      <div>工号</div>
      <div>姓名</div>
      <div>今日</div>
      <div>本月</div>
      <div>累计</div>
    </div>`;

  let grandToday = 0, grandMonth = 0, grandTotal = 0;
  let hasData = false;

  Object.keys(data.records || {}).forEach(empId => {
    const emp = data.emps.find(e => e.id === empId);
    if(!emp) return;

    let todayAmt = 0, monthAmt = 0, allAmt = 0;

    Object.keys(data.records[empId]).forEach(date => {
      const dateData = data.records[empId][date];
      if(!dateData || typeof dateData !== 'object') return;

      Object.keys(dateData).forEach(prodKey => {
        const recs = dateData[prodKey];
        if(!Array.isArray(recs)) return;
        recs.forEach(rec => {
          if(!rec || typeof rec !== 'object') return;
          const amt = (rec.n || 0) * (rec.p || 0);
          allAmt += amt;
          grandTotal += amt;
          if(date.startsWith(thisMonthStr)){
            monthAmt += amt;
            grandMonth += amt;
          }
          if(date === todayStr){
            todayAmt += amt;
            grandToday += amt;
          }
        });
      });
    });

    if(allAmt > 0){
      hasData = true;
      const nameClass = emp.name ? 'sum-col-name has-value' : 'sum-col-name';
      html += `<div class="sum-item">
        <div class="sum-col-id">${empId}</div>
        <div class="${nameClass}">${emp.name || '-'}</div>
        <div class="sum-col-amt">${todayAmt.toFixed(2)}</div>
        <div class="sum-col-amt">${monthAmt.toFixed(2)}</div>
        <div class="sum-col-amt">${allAmt.toFixed(2)}</div>
      </div>`;
    }
  });

  // 合计行
  if(hasData){
    html += `<div class="sum-footer">
      <div class="sum-footer-id">合计</div>
      <div></div>
      <div class="sum-footer-amt">${grandToday.toFixed(2)}</div>
      <div class="sum-footer-amt">${grandMonth.toFixed(2)}</div>
      <div class="sum-footer-amt">${grandTotal.toFixed(2)}</div>
    </div>`;
  }

  html += '</div>';
  if(!hasData) html = '<p style="text-align:center;padding:20px;color:#999">暂无数据</p>';
  document.getElementById('adminTotalList').innerHTML = html;
}

function toggleEditProcess(prodKey){
  const el = document.getElementById('prodEdit_' + prodKey);
  if(el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function saveProc(prodKey, idx){
  const name = document.getElementById(`ep_name_${prodKey}_${idx}`).value.trim();
  const price = parseFloat(document.getElementById(`ep_price_${prodKey}_${idx}`).value);
  if(!name || isNaN(price)){ showToast('请填写工序名称和单价', 'error'); return; }
  const remark = document.getElementById(`ep_remark_${prodKey}_${idx}`).value.trim();
  const proc = {n: name, p: price};
  if(remark) proc.r = remark;
  data.products[prodKey].processes[idx] = proc;
  saveData();
  adminLoadProductList();
  // 重新展开编辑面板
  const el = document.getElementById('prodEdit_' + prodKey);
  if(el) el.style.display = 'block';
  showToast('✅ 工序已保存', 'success');
}

function delProc(prodKey, idx){
  if(!confirm(`确定删除工序「${data.products[prodKey].processes[idx].n}」？`)) return;
  data.products[prodKey].processes.splice(idx, 1);
  saveData();
  adminLoadProductList();
  const el = document.getElementById('prodEdit_' + prodKey);
  if(el) el.style.display = 'block';
  showToast('❎ 已删除', 'delete');
}

function addProcess(prodKey){
  const name = document.getElementById(`procName_${prodKey}`).value.trim();
  const price = parseFloat(document.getElementById(`procPrice_${prodKey}`).value);
  if(!name || isNaN(price)){ alert('请填写工序名称和单价'); return; }
  const remark = document.getElementById(`procRemark_${prodKey}`).value.trim();
  const proc = {n: name, p: price};
  if(remark) proc.r = remark;
  data.products[prodKey].processes.push(proc);
  saveData();
  adminLoadProductList();
}

function adminDelProduct(key){
  if(!confirm('确定删除产品？')) return;
  delete data.products[key];
  saveData();
  adminLoadProductList();
  showToast('❎ 已删除', 'delete');
}

function addBatch(){
  const prod = document.getElementById('batchProd').value;
  const color = document.getElementById('batchColor').value.trim();
  const qty = parseInt(document.getElementById('batchQty').value);
  const price = parseFloat(document.getElementById('batchPrice').value);
  if(!prod || !qty || !price){ alert('请填写完整'); return; }
  const today = new Date();
  const ymd = today.getFullYear().toString()
    + String(today.getMonth() + 1).padStart(2, '0')
    + String(today.getDate()).padStart(2, '0');
  data.batchSeq[ymd] = (data.batchSeq[ymd] || 0) + 1;
  const seq = String(data.batchSeq[ymd]).padStart(2, '0');
  const batchCode = ymd + '-' + seq;
  const batchId = Date.now().toString();
  data.batches.push({
    id: batchId,
    batchCode: batchCode,
    prodKey: prod,
    prodName: data.products[prod].name,
    color: color || null,
    qty: qty,
    price: price,
    totalCost: qty * price,
    status: 'in',
    createTime: new Date().toLocaleString('zh-CN'),
    wageTotal: 0
  });
  saveData();
  adminLoadBatchList();
  document.getElementById('batchColor').value = '';
  document.getElementById('batchQty').value = '';
  document.getElementById('batchPrice').value = '';
}

function adminLoadBatchList(){
  const sorted = [...data.batches].reverse();
  const html = sorted.map(b => {
    const alreadyOut = (b.deliveries || []).reduce((s, d) => s + d.qty, 0);
    const remaining = b.qty - alreadyOut;
    // 状态文字 & 颜色：bg=背景色, color=文字色, border=边框色
    let statusText, statusBg, statusColor, statusBorder;
    if(b.status === 'out'){
      statusText = '✅ 已出库'; statusBg = '#ecfdf5'; statusColor = '#059669'; statusBorder = '#6ee7b7';
    } else if(b.status === 'closed'){
      statusText = '⛔ 已结束'; statusBg = '#f3f4f6'; statusColor = '#6b7280'; statusBorder = '#d1d5db';
    } else if(b.status === 'partial'){
      statusText = '🚚 部分出库'; statusBg = '#eff6ff'; statusColor = '#2563eb'; statusBorder = '#93c5fd';
    } else {
      statusText = '📦 入库中'; statusBg = '#fffbeb'; statusColor = '#d97706'; statusBorder = '#fcd34d';
    }
    // 出库按钮：入库中或部分出库才能继续出库
    const canOut = b.status === 'in' || b.status === 'partial';
    const btn = canOut ? `<button class="btn-sm btn-sm-orange" onclick="outBatch('${b.id}')" style="margin-right:6px">出库</button>` : '';

    // 进度条
    const pct = b.qty > 0 ? Math.round((alreadyOut / b.qty) * 100) : 0;
    const barColor = b.status==='out' ? '#10B981' : b.status==='closed' ? '#9ca3af' : b.status==='partial' ? '#3b82f6' : '#fbbf24';
    // 报损提示

      ? `<div style="font-size:13px;color:#6C757D;margin-top:4px;background:#f5f5f5;padding:4px 8px;border-radius:4px">
           ⚠️ 报损 <b>${b.lossQty}</b> 件 — ${b.lossReason || ''}
           ${b.closedTime ? '<span style="color:#aaa;margin-left:6px">'+b.closedTime+'</span>' : ''}
         </div>`
      : (b.status === 'closed' ? `<div style="font-size:13px;color:#10B981;margin-top:4px">✅ 批次已结束，无报损${b.closedTime?'（'+b.closedTime+'）':''}</div>` : '');
    const progressBar = `
      <div style="margin:10px 0 6px">
        <div style="display:flex;justify-content:space-between;font-size:13px;color:#6C757D;margin-bottom:4px">

        </div>

        </div>

    // 颜色 badge：根据颜色名称映射底色+文字色

function outBatch(batchId){
  const batch = data.batches.find(b => b.id === batchId);
  if(!batch) return;
  // 计算剩余可出库数量
  const alreadyOut = (batch.deliveries || []).reduce((s, d) => s + d.qty, 0);
  const remaining = batch.qty - alreadyOut;
  if(remaining <= 0){ showToast('该批次已全部出库', 'info'); return; }

  showOutBatchModal(batch, remaining);
}

// 结束批次（含报损）
function doCloseBatch(batchId, lossQty, reason, remark){
  const batch = data.batches.find(b => b.id === batchId);
  if(!batch) return;
  batch.status = 'closed';
  batch.closedTime = new Date().toLocaleString('zh-CN');
  if(lossQty > 0){
    batch.lossQty = lossQty;
    batch.lossReason = reason + (remark ? '：' + remark : '');
  } else {
    batch.lossQty = 0;
    batch.lossReason = remark || '';
  }
  // 最终利润 = 已出货利润之和（报损部分不计利润）
  batch.profit = (batch.deliveries || []).reduce((s, d) => s + d.profit, 0);
  saveData();
  adminLoadBatchList();
  const msg = lossQty > 0
    ? `批次已结束，报损 ${lossQty} 件（${reason}）`
    : `批次已结束，无报损`;
  showToast('✅ ' + msg, 'success');
}

function doOutBatch(batchId, qty, forceClose, manualWage){
  const batch = data.batches.find(b => b.id === batchId);
  if(!batch) return;
  // 初始化出货记录列表
  if(!batch.deliveries) batch.deliveries = [];
  const cost = qty * batch.price;
  // 薪资：优先使用手动输入值；若未传入则用增量（兼容旧调用）
  let wageShare;
  if(manualWage !== undefined && manualWage !== null){
    wageShare = manualWage;
  } else {
    // 兼容旧逻辑：增量 = 当前总薪资 - 已分摊薪资
    const alreadySharedWage = batch.deliveries.reduce((s, d) => s + (d.wageShare || 0), 0);
    wageShare = Math.max(0, (batch.wageTotal || 0) - alreadySharedWage);
  }
  const profit = cost - wageShare;
  batch.deliveries.push({
    date: new Date().toLocaleString('zh-CN'),
    qty: qty,
    cost: cost,
    wageShare: wageShare,
    profit: profit
  });
  // 更新汇总字段
  const totalOut = batch.deliveries.reduce((s, d) => s + d.qty, 0);
  batch.outQty = totalOut;
  batch.outCost = batch.deliveries.reduce((s, d) => s + d.cost, 0);
  batch.profit = batch.deliveries.reduce((s, d) => s + d.profit, 0);
  batch.outDate = batch.deliveries[batch.deliveries.length - 1].date;
  // 更新状态
  if(totalOut >= batch.qty){
    batch.status = 'out';
  } else {
    batch.status = 'partial';
  }
  saveData();
  adminLoadBatchList();
  showToast(`✅ 出库 ${qty} 件成功${batch.status !== 'out' ? '，剩余 '+(batch.qty - totalOut)+' 件待出库' : '，批次已全部出库'}`, 'success');
}

function recalcAllBatchProfit(){
  // 找出所有有出货记录的批次
  const batchesWithDeliveries = data.batches.filter(b => b.deliveries && b.deliveries.length > 0);
  if(batchesWithDeliveries.length === 0){
    showToast('没有出货记录需要修正', 'info');

  }

  // 构建弹窗 HTML，列出每条出货记录并允许修改薪资
  let rows = '';
  batchesWithDeliveries.forEach(b => {
    b.deliveries.forEach((d, i) => {
      const cost = d.cost || (d.qty * b.price);
      rows += `
        <tr style="border-bottom:1px solid #f0f0f0">
          <td style="padding:8px 6px;font-size:13px;color:#555">${b.batchCode}<br><span style="font-size:11px;color:#aaa">${b.prodName}${b.color?'·'+b.color:''}</span></td>
          <td style="padding:8px 6px;text-align:center;font-size:13px">第${i+1}次</td>
          <td style="padding:8px 6px;text-align:center;font-size:13px">${d.qty}件</td>
          <td style="padding:8px 6px;text-align:center;font-size:13px;color:#10B981">¥${cost.toFixed(2)}</td>
          <td style="padding:8px 6px;text-align:center">
            <input type="number" step="0.01" min="0" value="${(d.wageShare||0).toFixed(2)}"
              data-batchid="${b.id}" data-di="${i}"
              style="width:80px;font-size:13px;padding:4px 6px;border:1px solid #ddd;border-radius:4px;text-align:center">
          </td>
          <td style="padding:8px 6px;text-align:center;font-size:13px;color:#dc2626" id="recalcProfit_${b.id}_${i}">
            ¥${(d.profit||0).toFixed(2)}
          </td>
        </tr>`;
    });
  });

  // 创建弹窗
  let modal = document.getElementById('recalcModal');
  if(modal) modal.remove();
  modal = document.createElement('div');
  modal.id = 'recalcModal';
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal" style="max-width:560px;max-height:80vh;overflow-y:auto">
      <div class="modal-title">🔄 修正出货记录薪资</div>
      <div style="font-size:13px;color:#888;margin-bottom:12px">修改每次出货对应的员工薪资，利润将自动重算。</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead>
          <tr style="background:#E0E7FF;font-size:12px;color:#374151">
            <th style="padding:8px 6px;text-align:left">批次</th>
            <th style="padding:8px 6px;text-align:center">序号</th>
            <th style="padding:8px 6px;text-align:center">数量</th>
            <th style="padding:8px 6px;text-align:center">销售额</th>
            <th style="padding:8px 6px;text-align:center">员工薪资(元)</th>
            <th style="padding:8px 6px;text-align:center">利润</th>
          </tr>
        </thead>
        <tbody id="recalcBody">${rows}</tbody>
      </table>
      <div class="modal-btns" style="margin-top:16px">
        <button class="modal-btn modal-cancel" onclick="document.getElementById('recalcModal').classList.remove('show')">取消</button>
        <button class="modal-btn modal-confirm" onclick="saveRecalcProfit()">保存修正</button>
      </div>
    </div>`;
  document.body.appendChild(modal);

  // 实时预览利润
  modal.querySelectorAll('input[data-batchid]').forEach(input => {
    input.addEventListener('input', function(){
      const batchId = parseInt(this.dataset.batchid);

      if(!b || !b.deliveries[di]) return;
      const d = b.deliveries[di];
      const cost = d.cost || (d.qty * b.price);
      const wage = parseFloat(this.value) || 0;
      const el = document.getElementById(`recalcProfit_${batchId}_${di}`);
      if(el) el.textContent = '¥' + (cost - wage).toFixed(2);

  });

  modal.classList.add('show');

window.saveRecalcProfit = function(){
  const inputs = document.querySelectorAll('#recalcBody input[data-batchid]');
  inputs.forEach(input => {
    const batchId = parseInt(input.dataset.batchid);
    const di = parseInt(input.dataset.di);
    const b = data.batches.find(x => x.id === batchId);
    if(!b || !b.deliveries[di]) return;
    const d = b.deliveries[di];
    const cost = d.cost || (d.qty * b.price);
    const wage = parseFloat(input.value);
    d.wageShare = isNaN(wage) ? 0 : Math.max(0, wage);
    d.profit = cost - d.wageShare;
  });
  // 同步每个批次的汇总 profit
  data.batches.forEach(b => {
    if(b.deliveries && b.deliveries.length > 0){
      b.profit = b.deliveries.reduce((s, d) => s + d.profit, 0);
    }
  });
  saveData();
  adminLoadBatchList();
  document.getElementById('recalcModal').classList.remove('show');
  showToast('✅ 利润已修正并保存', 'success');
};

}

  const items = document.querySelectorAll('#regProcessList input');
  const processes = [];
  items.forEach(input => {
    const n = parseInt(input.value);
    if(n > 0){
      processes.push({n: input.dataset.n, p: parseFloat(input.dataset.p), count: n});
    }
  });
  if(processes.length === 0){ alert('请填写至少一个工序的数量'); return; }

  // 保存记录（和员工自助登记完全一致）
  const now = new Date();
  const date = now.toISOString().split('T')[0];
  const timeStr = now.toTimeString().split(' ')[0];
  // 找到该产品未出库的批次（FIFO），自动关联（in=入库中 / partial=部分出库 均可继续登记）
  const batch = [...data.batches]
    .filter(b => b.prodKey === prodKey && (b.status === 'in' || b.status === 'partial'))
    .sort((a, b) => a.createTime.localeCompare(b.createTime))[0];

  if(!batch){
    showModal({title:'提示', msg:'请联系老板创建入库信息，谢谢！'});
    return;
  }

  if(!data.records[empId]) data.records[empId] = {};
  if(!data.records[empId][date]) data.records[empId][date] = {};
  if(!data.records[empId][date][prodKey]) data.records[empId][date][prodKey] = [];
  processes.forEach(p => {
    const record = {name: p.n, n: p.count, p: p.p, time: timeStr};
    record.batchCode = batch.batchCode;
    data.records[empId][date][prodKey].push(record);
    batch.wageTotal += p.count * p.p;
  });
  saveData();

  // 显示结果
  const emp = data.emps.find(e => e.id === empId);
  const empName = emp ? (emp.name || empId) : empId;
  let html = `<div class="salary-card">`;
  html += `<div class="card-header">${date} ${timeStr} · ${data.products[prodKey].name}</div>`;
  let total = 0;
  processes.forEach(p => {
    const amt = p.count * p.p;
    total += amt;
    html += `<div class="detail-item"><span class="check-icon">✓</span><div>${p.n}：<span class="num">${p.count}</span> 个 × <span class="num">${p.p}</span>元/个 = <span class="num">${amt.toFixed(2)}</span>元</div></div>`;
  });
  html += `<div class="detail-item">本次薪资：<span class="total-salary">${total.toFixed(2)}</span>元</div>`;
  html += '</div>';

  const resultDiv = document.getElementById('regResult');
  if(resultDiv.innerHTML === '' || resultDiv.innerHTML.includes('暂无') || resultDiv.querySelector('.hint')){
    resultDiv.innerHTML = html;
  } else {
    resultDiv.innerHTML = html + resultDiv.innerHTML;
  }

  // 清空输入
  items.forEach(input => input.value = '');
}

function empShow(){
  const emp = data.emps.find(e => e.id === currentUser);
  if(!emp){ alert('未找到员工信息'); return; }

  if(!data.records[currentUser]){
    document.getElementById('empResult').innerHTML = '<p style="text-align:center;padding:20px;color:#999">暂无登记记录</p>';
    return;
  }

  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  const thisMonthStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  
  let todayTotal = 0;
  let monthTotal = 0;
  let allTotal = 0;

  // 按regId分组，每次登记一个卡片
  const regGroups = {};
  Object.keys(data.records[currentUser]).forEach(date => {
    const dateData = data.records[currentUser][date];
    if(!dateData || typeof dateData !== 'object') return;
    Object.keys(dateData).forEach(prodKey => {
      const recs = dateData[prodKey];
      if(!Array.isArray(recs)) return;
      recs.forEach(rec => {
        if(!rec || typeof rec !== 'object') return;
        const amount = (rec.n || 0) * (rec.p || 0);
        // 累计
        allTotal += amount;
        // 本月
        if(date.startsWith(thisMonthStr)){
          monthTotal += amount;
        }
        // 今日
        if(date === todayStr){
          todayTotal += amount;
        }
        
        const regId = rec.regId || 0;
        if(!regGroups[regId]){
          regGroups[regId] = {
            date: date,
            time: rec.time || '',
            prodKey: prodKey,
            prodName: data.products[prodKey]?.name || prodKey,
            recs: []
          };
        }
        regGroups[regId].recs.push(rec);
      });
    });
  });

  // 按regId降序（最新在前），无regId的放最后
  const sortedKeys = Object.keys(regGroups).sort((a, b) => {
    if(a == 0) return 1;
    if(b == 0) return -1;
    return b - a;
  });

  // 薪资合计头部
  const totalHtml = `
    <div class="salary-total-card">
      <div class="card-title">薪资合计</div>
      <div class="amount-container">
        <div class="amount-item">
          <span class="amount-label">今日</span>
          <span class="amount-value">${todayTotal.toFixed(2)}</span>
          <span class="amount-unit">元</span>
        </div>
        <div class="amount-item">
          <span class="amount-label">本月</span>
          <span class="amount-value">${monthTotal.toFixed(2)}</span>
          <span class="amount-unit">元</span>
        </div>
        <div class="amount-item">
          <span class="amount-label">累计</span>
          <span class="amount-value">${allTotal.toFixed(2)}</span>
          <span class="amount-unit">元</span>
        </div>
      </div>
    </div>
  `;

  if(sortedKeys.length === 0 || (sortedKeys.length === 1 && sortedKeys[0] == 0)){
    document.getElementById('empResult').innerHTML = totalHtml + '<p style="text-align:center;padding:20px;color:#999">暂无登记记录</p>';
    return;
  }

  let html = '';
  sortedKeys.forEach(regId => {
    const g = regGroups[regId];
    let recTotal = 0;
    let cardHtml = `<div class="salary-card">
      <div class="card-header">${g.date} ${g.time} · ${g.prodName}</div>`;
    g.recs.forEach(rec => {
      const amount = rec.n * rec.p;
      recTotal += amount;
      cardHtml += `<div class="detail-item"><span class="check-icon">✓</span><div>${rec.name || '工序'}：<span class="num">${rec.n}</span> 个 × <span class="num">${rec.p}</span>元/个 = <span class="num">${amount.toFixed(2)}</span>元</div></div>`;
    });
    cardHtml += `<div class="detail-item">本次薪资：<span class="total-salary">${recTotal.toFixed(2)}</span>元</div></div>`;
    html += cardHtml;
  });

  document.getElementById('empResult').innerHTML = totalHtml + html;
}

// Excel导出函数
function adminExportReport(){
  const now = new Date();
  const thisYearMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

  // ========== 工作表1：统计总览 ==========
  let inQty = 0, outQty = 0, profit = 0, wageTotal = 0;
  let allInQty = 0, allOutQty = 0, allProfit = 0, allWageTotal = 0;

  data.batches.forEach(b => {
    allInQty += b.qty;
    if(b.status === 'out'){
      allOutQty += b.outQty || b.qty;
      allProfit += b.profit || 0;
    }
    const createYM = parseYearMonth(b.createTime);
    if(createYM === thisYearMonth && b.status === 'in') inQty += b.qty;
    if(b.status === 'out'){
      const outYM = parseYearMonth(b.outDate || b.createTime);
      if(outYM === thisYearMonth){
        outQty += b.outQty || b.qty;
        profit += b.profit || 0;
      }
    }
  });

  Object.keys(data.records || {}).forEach(empId => {
    Object.keys(data.records[empId]).forEach(date => {
      const recYM = date.substring(0, 7);
      Object.keys(data.records[empId][date]).forEach(prodKey => {
        const recs = data.records[empId][date][prodKey];
        if(!Array.isArray(recs)) return;
        recs.forEach(rec => {
          if(rec && typeof rec === 'object'){
            const amt = (rec.n || 0) * (rec.p || 0);
            allWageTotal += amt;
            if(recYM === thisYearMonth) wageTotal += amt;
          }
        });
      });
    });
  });

  const overviewRows = [
    ['统计总览'],
    [''],
    ['项目', '本月', '累计'],
    ['入库数量', inQty, allInQty],
    ['出库数量', outQty, allOutQty],
    ['预估利润', profit.toFixed(2), allProfit.toFixed(2)],
    ['员工薪资', wageTotal.toFixed(2), allWageTotal.toFixed(2)],
    ['统计时间', now.toLocaleString('zh-CN'), '']
  ];

  // ========== 工作表2：批次信息 ==========
  const batchRows = [['批次号','产品','颜色','入库数量','单价','总成本','员工薪资','状态','已出库','报损数量','报损原因','剩余','创建时间','最后出库时间','实际利润']];
  data.batches.forEach(b => {
    const alreadyOut = (b.deliveries || []).reduce((s, d) => s + d.qty, 0);
    const remaining = b.qty - alreadyOut - (b.lossQty || 0);
    const totalProfit = (b.deliveries || []).reduce((s, d) => s + d.profit, 0) || b.profit || 0;
    let statusLabel = b.status === 'in' ? '入库中' : b.status === 'partial' ? '部分出库' : b.status === 'closed' ? '已结束' : '已出库';
    batchRows.push([
      b.batchCode || '', b.prodName || '', b.color || '', b.qty, b.price,
      (b.totalCost||0).toFixed(2), (b.wageTotal||0).toFixed(2),
      statusLabel, alreadyOut, b.lossQty || 0, b.lossReason || '',
      remaining < 0 ? 0 : remaining,
      b.createTime || '', b.outDate || b.closedTime || '', totalProfit.toFixed(2)
    ]);
    // 每次出货明细（子行）
    if(b.deliveries && b.deliveries.length > 0){
      b.deliveries.forEach((d, i) => {
        batchRows.push([
          `  └ 第${i+1}次出货`, '', '', '', '',
          '', '', '', d.qty, '', '', '',
          '', d.date, d.profit.toFixed(2)
        ]);
      });
    }
    // 报损行
    if(b.lossQty > 0){
      batchRows.push([
        `  └ 报损`, '', '', '', '',
        '', '', '', '', b.lossQty, b.lossReason || '', '',
        '', b.closedTime || '', '0.00'
      ]);
    }
  });

  // ========== 工作表3：产量记录 ==========
  const recordRows = [['工号','姓名','产品','工序','数量','单价','金额','日期','时间','批次号']];
  Object.keys(data.records).forEach(empId => {
    const emp = data.emps.find(e => e.id === empId);
    if(!emp) return;
    Object.keys(data.records[empId]).forEach(date => {
      const dateData = data.records[empId][date];
      if(!dateData || typeof dateData !== 'object') return;
      Object.keys(dateData).forEach(prodKey => {
        const prodName = data.products[prodKey]?.name || prodKey;
        const recs = dateData[prodKey];
        if(!Array.isArray(recs)) return;
        recs.forEach(rec => {
          const amount = (rec.n || 0) * (rec.p || 0);
          recordRows.push([empId, emp.name||'', prodName, rec.name||'', rec.n, rec.p, amount.toFixed(2), date, rec.time||'', rec.batchCode||'']);
        });
      });
    });
  });

  // ========== 工作表4：薪资明细 ==========
  const totalRows = [['工号','姓名','总金额']];
  const empTotals = {};
  Object.keys(data.records).forEach(empId => {
    const emp = data.emps.find(e => e.id === empId);
    if(!emp) return;
    let total = 0;
    Object.keys(data.records[empId]).forEach(date => {
      const dateData = data.records[empId][date];
      if(!dateData || typeof dateData !== 'object') return;
      Object.keys(dateData).forEach(prodKey => {
        const recs = dateData[prodKey];
        if(!Array.isArray(recs)) return;
        recs.forEach(rec => {
          total += (rec.n || 0) * (rec.p || 0);
        });
      });
    });
    if(total > 0){
      empTotals[empId] = total;
      totalRows.push([empId, emp.name||'', total.toFixed(2)]);
    }
  });
  const grandTotal = Object.values(empTotals).reduce((sum, val) => sum + val, 0);
  totalRows.push(['', '总计', grandTotal.toFixed(2)]);

  // ========== 工作表5：员工列表 ==========
  const empRows = [['工号','姓名']];
  data.emps.forEach(e => { empRows.push([e.id, e.name || '']); });

  // ========== 工作表6：产品列表 ==========
  const prodRows = [['产品名称','工序']];
  Object.keys(data.products).forEach(k => {
    const procs = data.products[k].processes.map(p => `${p.n}:${p.p}元`).join('; ');
    prodRows.push([data.products[k].name, procs]);
  });

  // 创建工作簿
  const wb = XLSX.utils.book_new();

  const ws1 = XLSX.utils.aoa_to_sheet(overviewRows);
  ws1['!cols'] = [{wch:12},{wch:15},{wch:15}];
  XLSX.utils.book_append_sheet(wb, ws1, '统计总览');

  const ws2 = XLSX.utils.aoa_to_sheet(batchRows);
  ws2['!cols'] = [{wch:14},{wch:10},{wch:8},{wch:8},{wch:8},{wch:10},{wch:10},{wch:8},{wch:18},{wch:18},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws2, '批次信息');

  const ws3 = XLSX.utils.aoa_to_sheet(recordRows);
  ws3['!cols'] = [{wch:8},{wch:10},{wch:10},{wch:12},{wch:8},{wch:8},{wch:10},{wch:12},{wch:10},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws3, '产量记录');

  const ws4 = XLSX.utils.aoa_to_sheet(totalRows);
  ws4['!cols'] = [{wch:10},{wch:10},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws4, '薪资明细');

  const ws5 = XLSX.utils.aoa_to_sheet(empRows);
  ws5['!cols'] = [{wch:10},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws5, '员工列表');

  const ws6 = XLSX.utils.aoa_to_sheet(prodRows);
  ws6['!cols'] = [{wch:12},{wch:40}];
  XLSX.utils.book_append_sheet(wb, ws6, '产品列表');

  const fileName = `工厂报表_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.xlsx`;
  XLSX.writeFile(wb, fileName);
}

function delRecord(recKey){
  const parts = recKey.split('|');
  if(parts.length !== 4) return;
  const [empId, date, prodKey, recIdx] = parts;
  const idx = parseInt(recIdx);
  showModal({
    title: '确认删除',
    msg: '确定删除这条登记记录吗？',
    confirmText: '删除',
    danger: true
  }).then(confirmed => {
    if(!confirmed) return;
    if(!data.records[empId] || !data.records[empId][date] || !data.records[empId][date][prodKey]) return;
    const recs = data.records[empId][date][prodKey];
    if(!Array.isArray(recs) || idx < 0 || idx >= recs.length) return;
    // 更新批次薪资
    const rec = recs[idx];
    const batch = data.batches.find(b => b.batchCode === rec.batchCode);
    if(batch){
      batch.wageTotal -= (rec.n || 0) * (rec.p || 0);
      if(batch.wageTotal < 0) batch.wageTotal = 0;
    }
    recs.splice(idx, 1);
    // 清理空数组
    if(recs.length === 0){
      delete data.records[empId][date][prodKey];
      if(Object.keys(data.records[empId][date]).length === 0){
        delete data.records[empId][date];
        if(Object.keys(data.records[empId]).length === 0){
          delete data.records[empId];
        }
      }
    }
    saveData();
    adminLoadRecord();
    showToast('❎ 已删除', 'delete');
  });
}

// ========== 修改记录 ==========
let _editRecordData = null;

function editRecord(recKey){
  const parts = recKey.split('|');
  if(parts.length !== 4) return;
  const [empId, date, prodKey, recIdx] = parts;
  const idx = parseInt(recIdx);
  if(!data.records[empId] || !data.records[empId][date] || !data.records[empId][date][prodKey]) return;
  const recs = data.records[empId][date][prodKey];
  if(!Array.isArray(recs) || idx < 0 || idx >= recs.length) return;
  const rec = recs[idx];
  _editRecordData = {empId, date, prodKey, idx};
  showModal({
    title: '修改记录',
    msg: `工序：${rec.name || '-'}<br>数量：<input type="number" id="editRecQty" value="${rec.n}" style="width:100%;padding:8px;margin-top:8px;border:1px solid #ccc;border-radius:6px">`,
    hasInput: false,
    confirmText: '保存'
  }).then(confirmed => {
    if(!confirmed) return;
    const newQty = parseInt(document.getElementById('editRecQty').value);
    if(isNaN(newQty) || newQty < 0){
      showModal({title:'提示', msg:'请输入有效的数量！', confirmText:'好的'});
      return;
    }
    // 更新批次薪资
    const oldAmt = (rec.n || 0) * (rec.p || 0);
    const newAmt = newQty * (rec.p || 0);
    const diff = newAmt - oldAmt;
    const batch = data.batches.find(b => b.batchCode === rec.batchCode);
    if(batch){
      batch.wageTotal += diff;
      if(batch.wageTotal < 0) batch.wageTotal = 0;
    }
    rec.n = newQty;
    saveData();
    adminLoadRecord();
    showToast('✅ 修改成功', 'success');
  });
}
</script>
